# Evaluation configuration
base: "base.yaml"

evaluation:
  # Retrieval quality metrics
  retrieval:
    k_values: [1, 3, 5, 10]

  # Fairness metrics
  fairness:
    enabled: true
    demographic_attributes: ["gender", "geo_group"]

  # Statistical significance
  statistics:
    bootstrap_samples: 1000
    confidence_level: 0.95
    random_seed: 42
