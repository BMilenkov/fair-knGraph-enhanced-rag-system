# Base configuration - shared defaults across all pipeline stages

seed: 42
device: "cuda"  # cuda (Colab T4) or cpu

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  kg_data: "data/kg"
  index_data: "data/indices"
  output_dir: "outputs"
  predictions: "outputs/predictions"
  metrics: "outputs/metrics"
  logs: "outputs/logs"

dataset:
  name: "2wikimultihopqa"
  split: "dev"
  max_samples: null  # null = use all samples; set to 100 for quick test

chunking:
  max_tokens: 512

logging:
  level: "INFO"
  log_to_file: true

# Neo4j AuraDB (free tier) — set env vars in Colab secrets or os.environ
# AuraDB uses neo4j+s:// protocol (encrypted), not bolt://
neo4j:
  uri: "${oc.env:NEO4J_URI,neo4j+s://xxxxxxxx.databases.neo4j.io}"
  user: "${oc.env:NEO4J_USER,neo4j}"
  password: "${oc.env:NEO4J_PASSWORD,}"
  database: "${oc.env:NEO4J_DATABASE,neo4j}"
  clear_on_start: false
