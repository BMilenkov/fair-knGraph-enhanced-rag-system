# Knowledge Graph extraction configuration
base: "base.yaml"

kg_extraction:
  # We use 2WikiMultiHopQA's ground-truth evidence triples from Wikidata directly.
  source: "evidence"

  # Entity linking (n-gram overlap normalization, KG2RAG section 3.2)
  entity_linking:
    ngram_size: 3
    overlap_threshold: 0.90

  # Neo4j persistence
  neo4j_batch_size: 2000
  save_intermediate: true  # save triplets JSON for inspection
